<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aure</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>Aure</h1>
      <button id="new-chat" title="New conversation">+</button>
    </header>

    <main id="messages"></main>

    <footer>
      <form id="input-form">
        <textarea id="input" placeholder="Ask a question..." rows="1" autofocus></textarea>
        <button type="submit" id="send-btn" title="Send">&#x2191;</button>
        <button type="button" id="cancel-btn" title="Cancel" hidden>&#x2715;</button>
      </form>
    </footer>
  </div>

  <script src="/chat.js"></script>
</body>
</html>
